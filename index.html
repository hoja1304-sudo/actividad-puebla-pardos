<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Afiche interactivo | Fundación de la Puebla de los Pardos</title>
  <style>
    :root {
      --green: #082f25;
      --green-soft: #123f32;
      --gold: #c99a3d;
      --cream: #f6efd9;
      --brown: #6f321d;
      --ink: #1d1a14;
      --shadow: 0 22px 60px rgba(0, 0, 0, 0.34);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--cream);
      background:
        radial-gradient(circle at 18% 10%, rgba(201, 154, 61, 0.18), transparent 30%),
        linear-gradient(135deg, #061b16 0%, #0d3027 46%, #4b2517 100%);
    }

    main {
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: clamp(14px, 3vw, 34px);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }

    .voice-tools {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }

    .voice-label {
      display: grid;
      gap: 4px;
      color: rgba(246, 239, 217, 0.86);
      font: 700 0.8rem system-ui, sans-serif;
      letter-spacing: 0;
    }

    .voice-select {
      width: min(280px, 54vw);
      min-height: 40px;
      border: 1px solid rgba(201, 154, 61, 0.75);
      border-radius: 999px;
      padding: 8px 36px 8px 14px;
      color: var(--cream);
      background: #123f32;
      font: 700 0.92rem system-ui, sans-serif;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.22);
    }

    h1 {
      margin: 0;
      font-size: clamp(1.25rem, 3vw, 2.35rem);
      line-height: 1.05;
      color: var(--cream);
      text-shadow: 0 2px 0 rgba(0, 0, 0, 0.35);
    }

    .stop-button,
    .listen-button,
    .close-button {
      position: relative;
      overflow: hidden;
      isolation: isolate;
      border: 1px solid rgba(255, 219, 136, 0.72);
      border-radius: 999px;
      color: var(--cream);
      background:
        linear-gradient(180deg, rgba(255, 229, 163, 0.2), transparent 42%),
        linear-gradient(180deg, #95512a 0%, #7a391f 52%, var(--brown) 100%);
      cursor: pointer;
      font: 800 0.94rem system-ui, sans-serif;
      letter-spacing: 0;
      text-shadow: 0 1px 1px rgba(0, 0, 0, 0.42);
      box-shadow:
        inset 0 1px 0 rgba(255, 247, 217, 0.35),
        inset 0 -5px 10px rgba(40, 15, 8, 0.34),
        0 3px 0 rgba(62, 24, 12, 0.92),
        0 12px 22px rgba(0, 0, 0, 0.26);
      transform: translateY(0);
      transition: transform 150ms ease, filter 150ms ease, box-shadow 150ms ease;
      -webkit-tap-highlight-color: transparent;
    }

    .stop-button::before,
    .listen-button::before,
    .close-button::before {
      content: "";
      position: absolute;
      inset: 1px 8px auto;
      height: 45%;
      z-index: -1;
      border-radius: inherit;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.24), rgba(255, 255, 255, 0));
      pointer-events: none;
    }

    .stop-button {
      padding: 11px 16px;
      white-space: nowrap;
    }

    .stop-button:hover,
    .listen-button:hover,
    .close-button:hover {
      transform: translateY(-2px);
      filter: brightness(1.07) saturate(1.04);
      box-shadow:
        inset 0 1px 0 rgba(255, 247, 217, 0.42),
        inset 0 -5px 10px rgba(40, 15, 8, 0.3),
        0 4px 0 rgba(62, 24, 12, 0.92),
        0 16px 28px rgba(0, 0, 0, 0.28);
    }

    .stop-button:active,
    .listen-button:active,
    .close-button:active {
      transform: translateY(2px);
      box-shadow:
        inset 0 2px 8px rgba(36, 13, 7, 0.38),
        inset 0 -2px 4px rgba(255, 239, 183, 0.12),
        0 1px 0 rgba(62, 24, 12, 0.9),
        0 7px 14px rgba(0, 0, 0, 0.22);
    }

    .stop-button:focus-visible,
    .listen-button:focus-visible,
    .close-button:focus-visible {
      outline: 3px solid rgba(247, 215, 138, 0.52);
      outline-offset: 3px;
    }

    .stage {
      position: relative;
      width: 100%;
      background: rgba(246, 239, 217, 0.08);
      border: 2px solid rgba(201, 154, 61, 0.75);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .poster {
      display: block;
      width: 100%;
      height: auto;
      user-select: none;
    }

    .hotspot {
      position: absolute;
      border: 2px solid transparent;
      border-radius: 8px;
      background: rgba(201, 154, 61, 0.01);
      cursor: pointer;
      transition: border-color 160ms ease, background 160ms ease, box-shadow 160ms ease;
    }

    .hotspot:hover,
    .hotspot:focus-visible,
    .hotspot.active {
      outline: none;
      border-color: rgba(248, 223, 164, 0.82);
      background: rgba(246, 239, 217, 0.08);
      box-shadow:
        inset 0 0 0 1px rgba(8, 47, 37, 0.22),
        0 10px 28px rgba(8, 22, 18, 0.18);
    }

    .card {
      position: fixed;
      right: max(18px, calc((100vw - 1180px) / 2 + 26px));
      bottom: 24px;
      z-index: 10;
      width: min(440px, calc(100vw - 28px));
      max-height: calc(100dvh - 48px);
      overflow: auto;
      padding: 24px;
      border: 1px solid rgba(255, 248, 224, 0.62);
      border-radius: 8px;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(255, 253, 245, 0.94), rgba(240, 228, 202, 0.86)),
        rgba(246, 239, 217, 0.9);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.72),
        0 28px 70px rgba(8, 19, 15, 0.32),
        0 4px 18px rgba(8, 19, 15, 0.14);
      backdrop-filter: blur(18px) saturate(1.08);
      -webkit-backdrop-filter: blur(18px) saturate(1.08);
      transform: translate3d(0, 14px, 0) scale(0.985);
      opacity: 0;
      pointer-events: none;
      transition:
        opacity 260ms cubic-bezier(0.16, 1, 0.3, 1),
        transform 260ms cubic-bezier(0.16, 1, 0.3, 1);
      will-change: transform, opacity;
      scrollbar-width: thin;
      scrollbar-color: rgba(8, 47, 37, 0.28) transparent;
    }

    .card.open {
      transform: translate3d(0, 0, 0) scale(1);
      opacity: 1;
      pointer-events: auto;
    }

    .card h2 {
      margin: 0 44px 10px 0;
      color: var(--green);
      font: 700 clamp(1.18rem, 3.5vw, 1.58rem)/1.08 Georgia, "Times New Roman", serif;
      letter-spacing: 0;
    }

    .card p {
      margin: 0 0 20px;
      font: 0.96rem/1.68 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: rgba(29, 26, 20, 0.82);
    }

    .card-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .video-button {
      display: none;
    }

    .video-button.show {
      display: inline-flex;
    }

    .video-panel {
      display: none;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid rgba(29, 26, 20, 0.12);
    }

    .video-panel.open {
      display: block;
    }

    .video-panel h3 {
      margin: 0 0 10px;
      color: rgba(29, 26, 20, 0.72);
      font: 700 0.82rem/1.2 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .video-panel video {
      display: block;
      width: 100%;
      max-height: 48vh;
      border: 1px solid rgba(29, 26, 20, 0.12);
      border-radius: 7px;
      background: #0d1815;
      box-shadow: 0 16px 34px rgba(8, 19, 15, 0.18);
    }

    .listen-button {
      min-height: 38px;
      padding: 9px 14px;
      border: 1px solid rgba(8, 47, 37, 0.18);
      border-radius: 999px;
      color: var(--green);
      background: rgba(255, 255, 255, 0.34);
      font: 700 0.84rem system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      text-shadow: none;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.62),
        0 8px 20px rgba(8, 19, 15, 0.08);
    }

    .close-button {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 32px;
      height: 32px;
      padding: 0;
      border: 1px solid rgba(8, 47, 37, 0.14);
      color: rgba(29, 26, 20, 0.72);
      background: rgba(255, 255, 255, 0.32);
      font-size: 1.12rem;
      line-height: 1;
      text-shadow: none;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.65),
        0 8px 18px rgba(8, 19, 15, 0.08);
    }

    .card .listen-button:hover,
    .card .close-button:hover {
      color: var(--green);
      background: rgba(255, 255, 255, 0.58);
      filter: none;
      transform: translateY(-1px);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.72),
        0 11px 24px rgba(8, 19, 15, 0.12);
    }

    .card .listen-button::before,
    .card .close-button::before {
      display: none;
    }

    .card .listen-button:active,
    .card .close-button:active {
      transform: translateY(1px);
      box-shadow:
        inset 0 1px 3px rgba(8, 19, 15, 0.1),
        0 5px 14px rgba(8, 19, 15, 0.08);
    }

    .hint {
      margin: 12px 0 0;
      color: rgba(246, 239, 217, 0.82);
      font: 0.95rem/1.45 system-ui, sans-serif;
    }

    .credit {
      margin: 0 0 16px;
      padding: 14px 18px;
      border: 1px solid rgba(201, 154, 61, 0.7);
      border-left: 6px solid var(--gold);
      color: var(--cream);
      background: rgba(8, 47, 37, 0.72);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.22);
      font: 0.98rem/1.5 system-ui, sans-serif;
    }

    .credit strong {
      color: #f7d78a;
    }

    @media (max-width: 700px) {
      main {
        padding: 10px;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .voice-tools,
      .stop-button {
        width: 100%;
      }

      .voice-label,
      .voice-select {
        width: 100%;
      }

      .stage {
        border-width: 1px;
        border-radius: 0;
      }

      .hotspot {
        border-radius: 5px;
      }

      .card {
        left: 10px;
        right: 10px;
        bottom: 10px;
        width: auto;
        max-height: calc(100dvh - 20px);
        padding: 18px;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="topbar">
      <h1>Fundación de la Puebla de los Pardos</h1>
      <div class="voice-tools">
        <label class="voice-label" for="voiceSelect">
          Voz
          <select class="voice-select" id="voiceSelect" aria-label="Seleccionar voz en español">
            <option value="">Cargando voces...</option>
          </select>
        </label>
        <button class="stop-button" type="button" id="stopSpeech">Detener narración</button>
      </div>
    </div>

    <footer class="credit">
      <strong>Material elaborado por:</strong> Asesor Regional de Matemática de la DRE-Cartago, José Alberto Jiménez Ruiz.
    </footer>

    <section class="stage" aria-label="Afiche histórico interactivo">
      <img
        class="poster"
        src="afiche.png"
        alt="Afiche sobre la Fundación de la Puebla de los Pardos en Cartago, Costa Rica, 1650">

      <button class="hotspot" type="button" data-zone="timeline" style="left: 1.1%; top: 18.2%; width: 97.8%; height: 16.2%;" aria-label="Línea de tiempo"></button>
      <button class="hotspot" type="button" data-zone="contexto" style="left: 1.1%; top: 34.8%; width: 97.8%; height: 14.2%;" aria-label="Contexto previo"></button>
      <button class="hotspot" type="button" data-zone="orden" style="left: 1.1%; top: 49.2%; width: 97.8%; height: 14.3%;" aria-label="Orden de fundación"></button>
      <button class="hotspot" type="button" data-zone="desarrollo" style="left: 1.1%; top: 63.8%; width: 97.8%; height: 14.8%;" aria-label="Desarrollo inicial"></button>
      <button class="hotspot" type="button" data-zone="vida" style="left: 1.1%; top: 78.8%; width: 97.8%; height: 12.1%;" aria-label="Vida e integración social"></button>
      <button class="hotspot" type="button" data-zone="idea" style="left: 35.4%; top: 91.6%; width: 63.4%; height: 7.1%;" aria-label="Idea clave"></button>
    </section>

    <p class="hint">Toca o pasa el mouse sobre una sección del afiche para explorarla.</p>
  </main>

  <aside class="card" id="infoCard" aria-live="polite" aria-hidden="true">
    <button class="close-button" type="button" id="closeCard" aria-label="Cerrar tarjeta">×</button>
    <h2 id="cardTitle"></h2>
    <p id="cardText"></p>
    <div class="card-actions">
      <button class="listen-button" type="button" id="listenAgain">Escuchar</button>
      <button class="listen-button video-button" type="button" id="showVideo">Obispo Morel</button>
      <button class="listen-button video-button" type="button" id="showCaravacaVideo">Cruz de Caravaca</button>
    </div>
    <div class="video-panel" id="videoPanel" aria-hidden="true">
      <h3 id="videoTitle">Video complementario</h3>
      <video id="ideaVideo" controls preload="metadata">
        <source id="videoSource" src="" type="video/mp4">
        Tu navegador no puede reproducir este video.
      </video>
    </div>
  </aside>

  <script>
    const zones = {
      timeline: {
        title: "Línea de tiempo",
        text: "Resume los hechos principales entre 1629 y 1679. Ayuda a ver cómo la población afrodescendiente libre pasó de vivir dispersa a formar un espacio organizado en Cartago.",
        speech: "En 1629, negros libres, mulatos y pardos vivían dispersos en los montes orientales de Cartago, especialmente en La Gotera, en los ejidos de la ciudad. El 10 de diciembre de 1650, el gobernador interino Juan Fernández de Salinas ordenó que pardos, mulatos y negros libres se concentraran en un solar específico en La Gotera, a una legua del centro urbano. En 1651, se asignaron 100 varas de tierra para el poblado, con capilla y cofradía. En 1653, se erigió la cofradía de la Virgen de los Ángeles, vinculada al hallazgo de La Negrita por la mulata Juana Pereira hacia 1635. Finalmente, en 1679, Miguel de Alvarado, figura como alcalde, muestra la integración de pobladores en oficios urbanos, aunque todavía existía segregación."
      },
      contexto: {
        title: "Contexto previo",
        text: "Antes de 1650, negros libres, mulatos y pardos habitaban zonas como La Gotera. Su dispersión preocupaba a las autoridades coloniales y generó intentos de control religioso y social.",
        speech: "Antes de 1650, negros libres, mulatos y pardos habitaban zonas como La Gotera. Su dispersión preocupaba a las autoridades coloniales y generó intentos de control religioso y social."
      },
      orden: {
        title: "Orden de fundación",
        text: "El 10 de diciembre de 1650 se ordenó concentrar a esta población en un solar específico. La medida buscaba vigilar, evangelizar y separar a estos grupos del centro urbano.",
        speech: "El 10 de diciembre de 1650 se ordenó concentrar a esta población en un solar específico. La medida buscaba vigilar, evangelizar y separar a estos grupos del centro urbano."
      },
      desarrollo: {
        title: "Desarrollo inicial",
        text: "En 1651 se asignaron tierras para el poblado y luego surgieron una capilla y una cofradía. Estas instituciones ayudaron a organizar la vida religiosa, económica y comunitaria.",
        speech: "En 1651 se asignaron tierras para el poblado y luego surgieron una capilla y una cofradía. Estas instituciones ayudaron a organizar la vida religiosa, económica y comunitaria."
      },
      vida: {
        title: "Vida e integración social",
        text: "Aunque existía segregación, algunos habitantes se integraron a oficios urbanos. El caso de Miguel de Alvarado, alcalde en 1679, muestra participación social dentro de Cartago.",
        speech: "Aunque existía segregación, algunos habitantes se integraron a oficios urbanos. El caso de Miguel de Alvarado, alcalde en 1679, muestra participación social dentro de Cartago."
      },
      idea: {
        title: "Idea clave",
        text: "La Puebla de los Pardos nació como un proyecto colonial de control, pero sus habitantes también construyeron formas propias de organización, identidad y participación social.",
        speech: "La Puebla de los Pardos nació como un proyecto colonial de control, pero sus habitantes también construyeron formas propias de organización, identidad y participación social.",
        videoTitle: "Historia de la Puebla de los Ángeles",
        videoLocalSrc: "video-puebla-angeles.mp4",
        videoWebSrc: "https://github.com/hoja1304-sudo/actividad-puebla-pardos/releases/download/video-puebla-angeles/video-puebla-angeles.mp4",
        extraVideos: [
          {
            title: "Cruz de caravaca en la actualidad",
            localSrc: "cruz-caravaca-celular.mp4",
            webSrc: "https://github.com/hoja1304-sudo/actividad-puebla-pardos/releases/download/cruz-caravaca-actualidad/cruz-caravaca-celular.mp4",
            speech: "Esta es la cruz de caravaca en la actualidad."
          }
        ]
      }
    };

    const card = document.querySelector("#infoCard");
    const cardTitle = document.querySelector("#cardTitle");
    const cardText = document.querySelector("#cardText");
    const videoPanel = document.querySelector("#videoPanel");
    const videoTitle = document.querySelector("#videoTitle");
    const ideaVideo = document.querySelector("#ideaVideo");
    const videoSource = document.querySelector("#videoSource");
    const showVideoButton = document.querySelector("#showVideo");
    const showCaravacaVideoButton = document.querySelector("#showCaravacaVideo");
    const voiceSelect = document.querySelector("#voiceSelect");
    const hotspots = document.querySelectorAll(".hotspot");
    let activeZone = null;
    let speakingZone = null;
    let availableVoices = [];
    let selectedVoiceURI = localStorage.getItem("pueblaPardosVoiceURI") || "";

    function scoreSpanishVoice(voice) {
      const lang = voice.lang.toLowerCase();
      const name = voice.name.toLowerCase();
      let score = 0;

      if (lang === "es-cr") score += 100;
      if (name.includes("costa rica") || name.includes("costarricense")) score += 95;
      if (lang === "es-419") score += 80;
      if (name.includes("latin") || name.includes("latino")) score += 70;
      if (lang === "es-mx" || lang === "es-us") score += 45;
      if (lang.startsWith("es")) score += 20;
      if (voice.localService) score += 4;
      if (lang === "es-es") score -= 8;

      return score;
    }

    function loadVoices() {
      if ("speechSynthesis" in window) {
        availableVoices = window.speechSynthesis.getVoices();
        updateVoiceSelect();
      }
    }

    function getSpanishVoice() {
      const normalizedVoices = availableVoices.length ? availableVoices : window.speechSynthesis.getVoices();
      const selectedVoice = normalizedVoices.find((voice) => voice.voiceURI === selectedVoiceURI);

      if (selectedVoice) {
        return selectedVoice;
      }

      const spanishVoices = normalizedVoices
        .filter((voice) => voice.lang.toLowerCase().startsWith("es"))
        .sort((a, b) => scoreSpanishVoice(b) - scoreSpanishVoice(a));

      const bestVoice = spanishVoices[0] || null;
      if (bestVoice) {
        selectedVoiceURI = bestVoice.voiceURI;
        localStorage.setItem("pueblaPardosVoiceURI", selectedVoiceURI);
      }

      return bestVoice;
    }

    function updateVoiceSelect() {
      const spanishVoices = availableVoices
        .filter((voice) => voice.lang.toLowerCase().startsWith("es"))
        .sort((a, b) => scoreSpanishVoice(b) - scoreSpanishVoice(a));

      voiceSelect.innerHTML = "";

      if (!spanishVoices.length) {
        const option = document.createElement("option");
        option.value = "";
        option.textContent = "Voz predeterminada del navegador";
        voiceSelect.appendChild(option);
        return;
      }

      if (!selectedVoiceURI || !spanishVoices.some((voice) => voice.voiceURI === selectedVoiceURI)) {
        selectedVoiceURI = spanishVoices[0].voiceURI;
        localStorage.setItem("pueblaPardosVoiceURI", selectedVoiceURI);
      }

      spanishVoices.forEach((voice) => {
        const option = document.createElement("option");
        option.value = voice.voiceURI;
        option.textContent = `${voice.name} (${voice.lang})`;
        option.selected = voice.voiceURI === selectedVoiceURI;
        voiceSelect.appendChild(option);
      });
    }

    function stopSpeech() {
      if ("speechSynthesis" in window) {
        window.speechSynthesis.cancel();
      }
      speakingZone = null;
      document.querySelector("#listenAgain").textContent = "Escuchar";
    }

    function stopVideo() {
      ideaVideo.pause();
      ideaVideo.currentTime = 0;
    }

    function hideVideo() {
      stopVideo();
      videoPanel.classList.remove("open");
      videoPanel.setAttribute("aria-hidden", "true");
    }

    function getVideoSrc(video) {
      if (location.protocol === "file:") {
        return video.localSrc || video.videoLocalSrc || video.webSrc || video.videoWebSrc;
      }

      return video.webSrc || video.videoWebSrc || video.localSrc || video.videoLocalSrc;
    }

    function showVideo(video) {
      const videoSrc = getVideoSrc(video);

      if (!videoSrc) {
        hideVideo();
        return;
      }

      videoTitle.textContent = video.title || video.videoTitle || "Video complementario";
      if (videoSource.getAttribute("src") !== videoSrc) {
        videoSource.setAttribute("src", videoSrc);
        ideaVideo.load();
      }
      videoPanel.classList.add("open");
      videoPanel.setAttribute("aria-hidden", "false");
    }

    function speakText(text) {
      if (!("speechSynthesis" in window) || !text) {
        return;
      }

      stopSpeech();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = "es-CR";
      const spanishVoice = getSpanishVoice();
      if (spanishVoice) {
        utterance.voice = spanishVoice;
        utterance.lang = spanishVoice.lang;
      }
      utterance.rate = 0.92;
      utterance.pitch = 0.95;
      window.speechSynthesis.speak(utterance);
    }

    function showAndPlayVideo(video, narration = "") {
      stopSpeech();
      stopVideo();
      showVideo(video);

      const playPromise = ideaVideo.play();
      if (playPromise) {
        playPromise.catch(() => {
          videoPanel.classList.add("open");
        });
      }

      if (narration) {
        speakText(narration);
      }
    }

    function speak(zone) {
      if (!("speechSynthesis" in window)) {
        return;
      }

      stopSpeech();
      hideVideo();
      const utterance = new SpeechSynthesisUtterance(zone.speech || zone.text);
      speakingZone = activeZone;
      document.querySelector("#listenAgain").textContent = "Detener";
      utterance.lang = "es-CR";
      const spanishVoice = getSpanishVoice();
      if (spanishVoice) {
        utterance.voice = spanishVoice;
        utterance.lang = spanishVoice.lang;
      }
      utterance.rate = 0.92;
      utterance.pitch = 0.95;
      utterance.onend = () => {
        speakingZone = null;
        document.querySelector("#listenAgain").textContent = "Escuchar";
      };
      window.speechSynthesis.speak(utterance);
    }

    function toggleSpeech() {
      if (!activeZone) {
        return;
      }

      if (speakingZone === activeZone && "speechSynthesis" in window && window.speechSynthesis.speaking) {
        stopSpeech();
        return;
      }

      speak(zones[activeZone]);
    }

    function openCard(key) {
      const zone = zones[key];
      activeZone = key;
      cardTitle.textContent = zone.title;
      cardText.textContent = zone.text;
      stopSpeech();
      hideVideo();
      showVideoButton.classList.toggle("show", Boolean(zone.videoLocalSrc || zone.videoWebSrc));
      showCaravacaVideoButton.classList.toggle("show", Boolean(zone.extraVideos?.length));
      card.classList.add("open");
      card.setAttribute("aria-hidden", "false");

      hotspots.forEach((hotspot) => {
        hotspot.classList.toggle("active", hotspot.dataset.zone === key);
      });

    }

    function closeCard() {
      stopSpeech();
      stopVideo();
      activeZone = null;
      card.classList.remove("open");
      card.setAttribute("aria-hidden", "true");
      showVideoButton.classList.remove("show");
      showCaravacaVideoButton.classList.remove("show");
      hotspots.forEach((hotspot) => hotspot.classList.remove("active"));
    }

    hotspots.forEach((hotspot) => {
      hotspot.addEventListener("click", () => openCard(hotspot.dataset.zone));
      hotspot.addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          openCard(hotspot.dataset.zone);
        }
      });
    });

    document.querySelector("#closeCard").addEventListener("click", closeCard);
    document.querySelector("#stopSpeech").addEventListener("click", stopSpeech);
    document.querySelector("#listenAgain").addEventListener("click", () => {
      toggleSpeech();
    });

    showVideoButton.addEventListener("click", () => {
      if (activeZone) {
        showAndPlayVideo(zones[activeZone]);
      }
    });

    showCaravacaVideoButton.addEventListener("click", () => {
      if (!activeZone) {
        return;
      }

      const caravacaVideo = zones[activeZone].extraVideos?.[0];
      if (caravacaVideo) {
        showAndPlayVideo(caravacaVideo);
      }
    });

    voiceSelect.addEventListener("change", () => {
      selectedVoiceURI = voiceSelect.value;
      localStorage.setItem("pueblaPardosVoiceURI", selectedVoiceURI);
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        closeCard();
      }
    });

    loadVoices();
    if ("speechSynthesis" in window) {
      window.speechSynthesis.addEventListener("voiceschanged", loadVoices);
    }
  </script>
</body>
</html>
